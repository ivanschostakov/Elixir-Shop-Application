# Linux deployment stack for API, admin SPA and background workers
services:
  redis:
    image: redis:7
    container_name: shop-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shop-backend-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: 172.18.0.1
      AUTH_LOGIN_WEBSITE_FIRST_ENABLED: "true"
      GOOGLE_APPLICATION_CREDENTIALS: /app/backend/.secrets/application_default_credentials.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    user: "0:0"
    ports:
      - "127.0.0.1:8000:8000"
    command:
      - /bin/sh
      - -lc
      - |
        mkdir -p /app/backend/media /app/backend/private_media /app/backend/logs \
        && chown -R 10001:10001 /app/backend/media /app/backend/private_media /app/backend/logs \
        && exec su -s /bin/sh app -c "python run.py"
    volumes:
      - ./backend/media:/app/backend/media
      - ./backend/private_media:/app/backend/private_media
      - ./backend/logs:/app/backend/logs
      - ./backend/.env:/app/backend/.env
      - ./backend/.secrets/application_default_credentials.json:/app/backend/.secrets/application_default_credentials.json:ro

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: shop-admin-web
    restart: unless-stopped
    depends_on:
      - backend-api
    ports:
      - "127.0.0.1:8080:80"

  worker-notifications:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shop-worker-notifications
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: 172.18.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    user: "0:0"
    command:
      - /bin/sh
      - -lc
      - |
        mkdir -p /app/backend/media /app/backend/logs \
        && chown -R 10001:10001 /app/backend/media /app/backend/logs \
        && exec su -s /bin/sh app -c "python -m src.workers.notifications"
    volumes:
      - ./backend/media:/app/backend/media
      - ./backend/logs:/app/backend/logs

  worker-moysklad-sync:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shop-worker-moysklad-sync
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: 172.18.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    user: "0:0"
    command:
      - /bin/sh
      - -lc
      - |
        mkdir -p /app/backend/media /app/backend/logs \
        && chown -R 10001:10001 /app/backend/media /app/backend/logs \
        && exec su -s /bin/sh app -c "python -m src.workers.moysklad_sync"
    volumes:
      - ./backend/media:/app/backend/media
      - ./backend/logs:/app/backend/logs

  worker-admin-jobs:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shop-worker-admin-jobs
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: 172.18.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    user: "0:0"
    command:
      - /bin/sh
      - -lc
      - |
        mkdir -p /app/backend/media /app/backend/private_media /app/backend/logs \
        && chown -R 10001:10001 /app/backend/media /app/backend/private_media /app/backend/logs \
        && exec su -s /bin/sh app -c "python -m src.workers.admin_jobs"
    volumes:
      - ./backend/media:/app/backend/media
      - ./backend/private_media:/app/backend/private_media
      - ./backend/logs:/app/backend/logs

  worker-admin-automation:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shop-worker-admin-automation
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: 172.18.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    user: "0:0"
    command:
      - /bin/sh
      - -lc
      - |
        mkdir -p /app/backend/media /app/backend/logs \
        && chown -R 10001:10001 /app/backend/media /app/backend/logs \
        && exec su -s /bin/sh app -c "python -m src.workers.admin_automation"
    volumes:
      - ./backend/media:/app/backend/media
      - ./backend/logs:/app/backend/logs

  worker-telegram-polling:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shop-worker-telegram-polling
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: 127.0.0.1
    network_mode: host
    user: "0:0"
    command:
      - /bin/sh
      - -lc
      - |
        mkdir -p /app/backend/media /app/backend/private_media /app/backend/logs /app/backend/.secrets/telegram-userbot \
        && chown -R 10001:10001 /app/backend/media /app/backend/private_media /app/backend/logs /app/backend/.secrets/telegram-userbot \
        && chmod 700 /app/backend/.secrets/telegram-userbot \
        && exec su -s /bin/sh app -c "python -m src.workers.telegram_polling"
    volumes:
      - ./backend/media:/app/backend/media
      - ./backend/private_media:/app/backend/private_media
      - ./backend/logs:/app/backend/logs
      - ./backend/.secrets/telegram-userbot:/app/backend/.secrets/telegram-userbot

volumes:
  redis_data:
